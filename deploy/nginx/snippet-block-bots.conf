# Optional: blokuoti žinomus škodinguosius botus pagal User-Agent
# Map įdėk į http {} (nginx.conf arba include): include snippets/sora-block-bots.conf;
# Po to savo server {} bloke po server_name pridėk: if ($sora_bad_bot) { return 444; }

map $http_user_agent $sora_bad_bot {
    default 0;
    ~*scanner    1;
    ~*sqlmap     1;
    ~*nikto      1;
    ~*nmap       1;
    ~*masscan    1;
    ~*zgrab      1;
    ""           0;
}
