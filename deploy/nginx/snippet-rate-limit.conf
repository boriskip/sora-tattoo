# Rate limiting – apsauga nuo botų ir per didelio API naudojimo
# Šis failas turi būti įtrauktas į http {} bloką (ne į server {}).
# Pridėk į /etc/nginx/nginx.conf, į http { } bloką:
#   include /etc/nginx/snippets/sora-rate-limit.conf;

# 10 req/s per IP, burst 20 (trumpas spike leidžiamas)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
