# SORA Tattoo API – api.soratattoo.de
# 1) Įdėk į /etc/nginx/sites-available/, įjunk, reload nginx.
# 2) Paleisk: certbot --nginx -d api.soratattoo.de (sukurs HTTPS ir redirect).
# 3) Po certbot į 443 server bloką pridėk: limit_req zone=api_limit burst=20 nodelay;
#    ir limit_req_status 429; (rate limit – žiūrėk README).
# Rate limit zone turi būti apibrėžta nginx.conf http {} – include snippets/sora-rate-limit.conf;

server {
    listen 80;
    listen [::]:80;
    server_name api.soratattoo.de;

    root /var/www/sora-tattoo-api/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
